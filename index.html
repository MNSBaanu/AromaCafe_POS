<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroma Cafe POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="bg-amber-900 text-white p-4 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="text-3xl">☕</span>
            <div>
                <h1 class="text-xl font-bold">Aroma Cafe POS</h1>
                <p class="text-xs text-amber-200">Point of Sale System</p>
            </div>
        </div>
        <div class="text-right">
            <p id="current-date" class="text-sm"></p>
            <p id="current-time" class="text-lg font-mono"></p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">
        <!-- Products Section -->
        <section class="flex-1 flex flex-col p-4 overflow-hidden border-r border-gray-200 bg-gray-50">
            <!-- Categories -->
            <div class="flex gap-2 mb-4 overflow-x-auto pb-2 scrollbar-hide">
                <button class="cat-btn bg-amber-600 text-white px-6 py-2 rounded-full font-medium shadow-sm whitespace-nowrap">All</button>
                <button class="cat-btn bg-white text-gray-700 px-6 py-2 rounded-full font-medium shadow-sm hover:bg-amber-50 whitespace-nowrap">Coffee</button>
                <button class="cat-btn bg-white text-gray-700 px-6 py-2 rounded-full font-medium shadow-sm hover:bg-amber-50 whitespace-nowrap">Pastry</button>
                <button class="cat-btn bg-white text-gray-700 px-6 py-2 rounded-full font-medium shadow-sm hover:bg-amber-50 whitespace-nowrap">Cold Drink</button>
            </div>

            <!-- Product Grid -->
            <div id="product-list" class="product-grid overflow-y-auto p-1 h-full">
                <!-- Products loaded by renderer.js -->
            </div>
        </section>

        <!-- Sidebar / Cart Section -->
        <aside class="w-96 flex flex-col bg-white shadow-xl">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    🛒 Order Details
                </h2>
                <button onclick="clearCart()" class="text-xs text-red-500 hover:text-red-700 font-semibold uppercase tracking-wider">
                    Clear All
                </button>
            </div>

            <!-- Cart Items -->
            <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3">
                <!-- Cart items loaded by renderer.js -->
            </div>

            <!-- Order Summary -->
            <div class="p-6 bg-gray-50 border-t border-gray-200 space-y-3">
                <div class="flex justify-between text-gray-600">
                    <span>Subtotal</span>
                    <span class="font-semibold">$<span id="subtotal">0.00</span></span>
                </div>
                <div class="flex justify-between text-gray-600">
                    <span>Tax (8%)</span>
                    <span class="font-semibold">$<span id="tax">0.00</span></span>
                </div>
                <div class="flex justify-between text-2xl font-bold text-gray-900 pt-2 border-t border-gray-200">
                    <span>Total</span>
                    <span class="text-amber-800">$<span id="total">0.00</span></span>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mt-6">
                    <button onclick="checkout()" class="col-span-2 bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl font-bold text-lg shadow-lg transition-transform active:scale-95">
                        PLACE ORDER
                    </button>
                    <button class="bg-gray-200 hover:bg-gray-300 text-gray-700 py-3 rounded-xl font-semibold transition-colors">
                        Hold Order
                    </button>
                    <button onclick="printReceipt()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 py-3 rounded-xl font-semibold transition-colors">
                        Print Receipt
                    </button>
                </div>
            </div>
        </aside>
    </main>

    <script src="renderer.js"></script>
    <script>
        // Update time and date
        function updateTime() {
            const now = new Date();
            document.getElementById('current-date').innerText = now.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('current-time').innerText = now.toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
